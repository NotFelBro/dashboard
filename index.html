<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header>
      <nav>
        <h1><h1>Painel de Ferramentas</h1></h1>
      </nav>
    </header>

    <main>
      <aside>
        <ul id="evento-pai">
          <li><button id="moeda">Moedas</button></li>
          <li><button id="imc">IMC</button></li>
          <li><button id="temperatura">Temperatura</button></li>
          <li><button id="velocidade">Velocidade</button></li>
          <li><button id="massa">Massa</button></li>
          <li><button id="regra3">Regra de 3</button></li>
        </ul>
      </aside>

      <section class="secao-moeda ativa">
        <div class="card">
          <div class="card-header">
            <h2>Conversor de Moedas</h2>
            <span id="taxa-badge" class="badge">carregando...</span>
          </div>
          <div class="grupo">
            <label for="moeda-valor">Valor</label>
            <input
              type="number"
              id="moeda-valor"
              placeholder="Ex: 100"
              min="0"
            />
          </div>
          <div class="linha-dupla">
            <div class="grupo">
              <label for="moeda-de">De</label>
              <select id="moeda-de">
                <option value="BRL">BRL — Real</option>
                <option value="USD">USD — Dólar</option>
                <option value="EUR">EUR — Euro</option>
              </select>
            </div>
            <div class="grupo">
              <label for="moeda-para">Para</label>
              <select id="moeda-para">
                <option value="USD" selected>USD — Dólar</option>
                <option value="BRL">BRL — Real</option>
                <option value="EUR">EUR — Euro</option>
              </select>
            </div>
          </div>
          <button onclick="converterMoeda()">Converter</button>
          <div class="resultado" id="moeda-resultado">=</div>
        </div>

      <section class="secao-imc">
        <div class="card">
          <div class="card-header">
            <h2>Calculadora de IMC</h2>
          </div>
          <div class="linha-dupla">
            <div class="grupo">
              <label for="imc-peso">Peso (kg)</label>
              <input type="number" id="imc-peso" placeholder="Ex: 70" min="1" />
            </div>
            <div class="grupo">
              <label for="imc-altura">Altura (m)</label>
              <input
                type="number"
                id="imc-altura"
                placeholder="Ex: 1.75"
                step="0.01"
              />
            </div>
          </div>
          <button onclick="calcularIMC()">Calcular</button>
          <div class="resultado" id="imc-resultado">—</div>
        </div>
      </section>

      <section class="secao-temperatura">
        <div class="card">
          <div class="card-header">
            <h2>Conversor de Temperatura</h2>
          </div>
          <div class="grupo">
            <label for="temp-valor">Valor</label>
            <input type="number" id="temp-valor" placeholder="Ex: 100" />
          </div>
          <div class="grupo">
            <label for="temp-de">De</label>
            <select id="temp-de">
              <option value="C">Celsius (°C)</option>
              <option value="F">Fahrenheit (°F)</option>
              <option value="K">Kelvin (K)</option>
            </select>
          </div>
          <button onclick="converterTemperatura()">Converter</button>
          <div class="resultado" id="temp-resultado">—</div>
        </div>
      </section>

      <section class="secao-velocidade">
        <div class="card">
          <div class="card-header">
            <h2>Conversor de Velocidade</h2>
          </div>
          <div class="grupo">
            <label for="vel-valor">Valor</label>
            <input type="number" id="vel-valor" placeholder="Ex: 100" min="0" />
          </div>
          <div class="grupo">
            <label for="vel-de">De</label>
            <select id="vel-de">
              <option value="kmh">km/h</option>
              <option value="ms">m/s</option>
              <option value="mph">mph</option>
              <option value="kts">nós (kts)</option>
            </select>
          </div>
          <button onclick="converterVelocidade()">Converter</button>
          <div class="resultado" id="vel-resultado">—</div>
        </div>
      </section>

       <section class="secao-regra3">
        <div class="card">
          <div class="card-header">
            <h2>Regra de 3</h2>
          </div>
          <p class="descricao-r3">
            Se <strong>A</strong> está para <strong>B</strong>, então
            <strong>C</strong> está para <strong>X</strong>
          </p>
          <div class="linha-dupla">
            <div class="grupo">
              <label for="r3-a">A</label>
              <input type="number" id="r3-a" placeholder="Ex: 10" />
            </div>
            <div class="grupo">
              <label for="r3-b">B</label>
              <input type="number" id="r3-b" placeholder="Ex: 5" />
            </div>
            <div class="grupo">
              <label for="r3-c">C</label>
              <input type="number" id="r3-c" placeholder="Ex: 20" />
            </div>
          </div>
          <button onclick="calcularRegra3()">Calcular X</button>
          <div class="resultado" id="r3-resultado">—</div>
        </div>
      </section>
    </main>

    <footer>
      <p>FOOTER</p>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
