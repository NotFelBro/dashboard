<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header>
      <nav>
        <h1><h1>Painel de Ferramentas</h1></h1>
      </nav>
    </header>

    <main>
      <aside>
        <ul id="evento-pai">
          <li><button id="moeda">Moedas</button></li>
          <li><button id="imc">IMC</button></li>
          <li><button id="temperatura">Temperatura</button></li>
          <li><button id="velocidade">Velocidade</button></li>
          <li><button id="massa">Massa</button></li>
          <li><button id="regra3">Regra de 3</button></li>
        </ul>
      </aside>

      <section class="secao-moeda ativa">
        <h2>Conversor de moedas</h2>
        <div class="card">
          <h2>Conversor de Moedas</h2>
          <div class="grupo">
            <label for="valor-moeda">Valor em Reais (R$)</label>
            <input
              type="number"
              id="valor-moeda"
              placeholder="Ex: 100"
              min="0"
            />
          </div>
          <button class="btn-calcular" id="btn-moeda">Converter</button>
          <div class="resultado" id="resultado-moeda"></div>
        </div>
      </section>

      <section class="secao-imc">
        <div class="card">
          <h2>Calculadora IMC</h2>
          <div class="grupo">
            <label for="peso">Peso (Kg)</label>
            <input type="number" id="peso" placeholder="Ex: 70" min="0" />
          </div>
          <div class="grupo">
            <label for="altura">Altura (cm)</label>
            <input type="number" id="altura" placeholder="Ex: 175" min="0" />
          </div>
          <button class="btn-calcular" id="btn-imc">Calcular</button>
          <div class="resultado" id="resultado-imc"></div>
        </div>
      </section>

      <section class="secao-temperatura">
        <div class="card">
          <h2>Conversor de Temperatura</h2>
          <div class="grupo">
            <label for="de-tempo">De</label>
            <select id="de-tempo">
              <option value="celsius">Celcius (°C)</option>
              <option value="fahrenheit">fahrenheit (°F)</option>
              <option value="kelvin">kelvin (K)</option>
            </select>
          </div>
          <div class="grupo">
            <label for="para-tempo">Para</label>
            <select id="para-tempo">
              <option value="celsius">Celcius (°C)</option>
              <option value="fahrenheit">fahrenheit (°F)</option>
              <option value="kelvin">kelvin (K)</option>
            </select>
          </div>
          <button class="btn-calcular" id="btn-temperatura">Converter</button>
          <div class="resultado" id="resultado-temperatura"></div>
        </div>
      </section>

      <section class="secao-velocidae">
        <div class="card">
          <h2>COnversor de Velocidade</h2>
          <div class="grupo">
            <label for="valor-vel">Valor</label>
            <input type="number" id="valor-vel" placeholder="Ex: 100" min="0" />
          </div>
          <div class="grupo">
            <label for="de-velocidade">De</label>
            <select id="de-velocidade">
              <option value="kmh">km/h</option>
              <option value="m/s">m/s</option>
              <option value="mph">mph</option>
              <option value="knot">Nós (knot)</option>
            </select>
          </div>
          <div class="grupo">
            <label for="para-velocidade">De</label>
            <select id="para-velocidade">
              <option value="kmh">km/h</option>
              <option value="m/s">m/s</option>
              <option value="mph">mph</option>
              <option value="knot">Nós (knot)</option>
            </select>
          </div>
          <button class="btn-calcular" id="btn-velocidade">Converter</button>
          <div class="resultado" id="resultado-velocidade"></div>
        </div>
      </section>

      <section class="secao-massa">
        <h2>Conversor de massa</h2>
        <p>Conteúdo para o conversor de massa</p>
      </section>

      <section class="secao-regra3">
        <h2>Regra de 3</h2>
        <p>Conteúdo para a regra de 3</p>
      </section>
    </main>

    <footer>
      <p>FOOTER</p>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
