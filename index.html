<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header>
      <nav>
        <h1><h1>Painel de Ferramentas</h1></h1>
      </nav>
    </header>

    <main>
      <aside>
        <ul id="evento-pai">
          <li><button id="moeda">Moedas</button></li>
          <li><button id="imc">IMC</button></li>
          <li><button id="temperatura">Temperatura</button></li>
          <li><button id="velocidade">Velocidade</button></li>
          <li><button id="massa">Massa</button></li>
          <li><button id="regra3">Regra de 3</button></li>
        </ul>
      </aside>

      <section class="secao-moeda ativa">
        <div class="card">
          <div class="card-header">
            <h2>Conversor de Moedas</h2>
            <span id="taxa" class="badge">carregando...</span>
          </div>
          <div class="grupo">
            <label for="valor-moeda">Valor</label>
            <input
              type="number"
              id="valor-moeda"
              placeholder="Ex: 100"
              min="0"
            />
          </div>
          <div class="linha-dupla">
            <div class="grupo">
            <label for="moeda-de">De</label>
            <select id="moeda-de">
              <option value="BRL">BRL - Real</option>
              <option value="USD">USD - Dólar</option>
              <option value="EUR">EUR - Euro</option>
            </select>
          </div>
          <div class="grupo">
            <label for="moeda-para">Para</label>
            <label for="moeda-para">
              <option value="USD" selected>USD - Dólar</option>
              <option value="BRL">BRL - Real</option>
              <option value="EUR">EUR - Euro</option>
            </label>
            </div>
          </div>
            <button onclick="converterMoeda()">Converter</button>
            <div class="resultado" id="moeda-resultado">-</div>
      </section>

      <section class="secao-imc">
        <div class="card">
          <div class="card-header">
            <h2>Calculadora de IMC</h2>
          </div>
          <div class="linha-dupla">
            <div class="campo">
              <label for="imc-peso">Peso (kg)</label>
              <input type="number" id="imc-peso" placeholder="Ex: 70" min="1" />
            </div>
            <div class="campo">
              <label for="imc-altura">Altura (m)</label>
              <input
                type="number"
                id="imc-altura"
                placeholder="Ex: 1.75"
                step="0.01"
              />
            </div>
          </div>
          <button onclick="calcularIMC()">Calcular</button>
          <div class="resultado" id="imc-resultado">—</div>
        </div>
      </section>

      <section class="secao-temperatura">
        <div class="card">
          <h2>Conversor de Temperatura</h2>
          <div class="grupo">
            <label for="de-tempo">De</label>
            <select id="de-tempo">
              <option value="celsius">Celcius (°C)</option>
              <option value="fahrenheit">fahrenheit (°F)</option>
              <option value="kelvin">kelvin (K)</option>
            </select>
          </div>
          <div class="grupo">
            <label for="para-tempo">Para</label>
            <select id="para-tempo">
              <option value="celsius">Celcius (°C)</option>
              <option value="fahrenheit">fahrenheit (°F)</option>
              <option value="kelvin">kelvin (K)</option>
            </select>
          </div>
          <button class="btn-calcular" id="btn-temperatura">Converter</button>
          <div class="resultado" id="resultado-temperatura"></div>
        </div>
      </section>

      <section class="secao-velocidade">
        <div class="card">
          <h2>Conversor de Velocidade</h2>
          <div class="grupo">
            <label for="valor-vel">Valor</label>
            <input type="number" id="valor-vel" placeholder="Ex: 100" min="0" />
          </div>
          <div class="grupo">
            <label for="de-velocidade">De</label>
            <select id="de-velocidade">
              <option value="kmh">km/h</option>
              <option value="m/s">m/s</option>
              <option value="mph">mph</option>
              <option value="knot">Nós (knot)</option>
            </select>
          </div>
          <div class="grupo">
            <label for="para-velocidade">De</label>
            <select id="para-velocidade">
              <option value="kmh">km/h</option>
              <option value="m/s">m/s</option>
              <option value="mph">mph</option>
              <option value="knot">Nós (knot)</option>
            </select>
          </div>
          <button class="btn-calcular" id="btn-velocidade">Converter</button>
          <div class="resultado" id="resultado-velocidade"></div>
        </div>
      </section>

      <section class="secao-massa">
        <div class="card">
          <h2>Converspr de MAssa</h2>
          <div class="grupo">
            <label for="valor-massa">Valor</label>
            <input type="number" id="valor-massa" placeholder="Ex: 1" min="0" />
          </div>
          <div class="grupo">
            <label for="de-massa">De</label>
            <select id="de-massa">
              <option value="kg">Quilograma (Kg)</option>
              <option value="g">Grama (G)</option>
              <option value="mg">Miligrama (mg)</option>
              <option value="lb">Libra (lb)</option>
              <option value="t">Tonelada (t)</option>
            </select>
          </div>
          <div class="grupo">
            <label for="para-massa">Para</label>
            <select id="para-massa">
              <option value="kg">Quilograma (Kg)</option>
              <option value="g">Grama (G)</option>
              <option value="mg">Miligrama (mg)</option>
              <option value="lb">Libra (lb)</option>
              <option value="t">Tonelada (t)</option>
            </select>
          </div>
          <button class="btn-calcular" id="btn-massa">Converter</button>
          <div class="resultado" id="resultado-massa"></div>
        </div>
      </section>

      <section class="secao-regra3">
        <div class="card">
          <h2>Regra de 3</h2>
          <p>
            Se <strong>A</strong> está para <strong>B</strong>, então
            <strong>C</strong> está para <strong>?</strong>
          </p>
          <div class="regra3-grid">
            <div class="grupo">
              <label for="r3-a">A</label>
              <input type="number" id="r3-a" placeholder="Ex: 10" />
            </div>
            <div class="grupo">
              <label for="re3-b">B</label>
              <input type="number" id="re3-b" placeholder="Ex: 5" />
              <div class="grupo">
                <label for="re3-c">C</label>
                <input type="number" id="re3-c" placeholder="Ex: 20" />
              </div>
              <div class="campo-resultado" id="resultado-regra3-campo">—</div>
            </div>
          </div>
          <button class="btn-calcular" id="btn-regra3">Calcular</button>
          <div class="resultado" id="resultado-regra3"></div>
        </div>
      </section>
    </main>

    <footer>
      <p>FOOTER</p>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
